services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ascent
      POSTGRES_PASSWORD: ascent
      POSTGRES_DB: ascent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
